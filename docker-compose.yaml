version: '3.8'

services:
  codetester:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/agentnxt/codetester:latest
    container_name: codetester
    volumes:
      # Mount local code for testing
      - ./src:/app/src
      - ./examples:/app/examples
      # Volume for test outputs
      - codetester-data:/app/data
    environment:
      # GitHub Copilot settings
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    stdin_open: true
    tty: true
    command: python -c "print('CodeTester ready!')"

  # Development service with hot reload
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/agentnxt/codetester:dev
    container_name: codetester-dev
    volumes:
      - ./src:/app/src
      - ./examples:/app/examples
    environment:
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    stdin_open: true
    tty: true
    command: python -m pytest -v

volumes:
  codetester-data:
    driver: local